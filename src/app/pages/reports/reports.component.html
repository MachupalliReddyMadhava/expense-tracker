<h2>Expense Reports</h2>
<!-- <h2>Expense Distribution</h2> -->

<app-expense-chart [data]="chartData"> </app-expense-chart>

<hr />
<table border="1">
  <thead>
    <tr>
      <th>Category</th>
      <th>Total Spent</th>
    </tr>
  </thead>

  <tbody>
    @for (item of categoryWiseExpenses; track item[0]) {
      <tr>
        <td>{{ item[0] }}</td>

        <td>₹ {{ item[1] }}</td>
      </tr>
    }
  </tbody>
</table>
<hr />
<div class="report-card">
  <h2>Monthly Expense Trend</h2>
  <app-monthly-trend-chart [data]="monthlyTrendData"></app-monthly-trend-chart>
</div>
<div class="analytics-summary">
  <div class="summary-box">
    <h3>Highest Month</h3>

    <p class="month-name">
      {{ highestMonthDetails.month }}
    </p>

    <p class="month-amount">₹ {{ highestMonthDetails.amount }}</p>
  </div>

  <div class="summary-box">
    <h3>Average Monthly Spend</h3>

    <p>₹ {{ averageMonthlyExpense }}</p>
  </div>
</div>
<div class="export-container">
  <button class="export-btn" (click)="exportToExcel()">
    📥 Export to Excel
  </button>
</div>
