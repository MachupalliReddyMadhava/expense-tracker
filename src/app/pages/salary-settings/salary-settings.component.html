<h2>Salary Settings</h2>

@if(successMessage){

  <p>{{ successMessage }}</p>

}

<form
  [formGroup]="salaryForm"
  (ngSubmit)="saveSalary()">

  <label>Monthly Salary *</label>

  <input
    type="number"
    formControlName="salary">

  @if(salaryForm.get('salary')?.touched &&
      salaryForm.get('salary')?.invalid){

    <small>
      Salary is required and must be greater than 0
    </small>

  }

  <br><br>

  <button type="submit">
    Save Salary
  </button>

</form>
